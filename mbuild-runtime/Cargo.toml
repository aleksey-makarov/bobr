[package]
name = "mbuild-runtime"
version = "0.1.0"
edition = "2024"

[features]
integration-tests = []

[dependencies]
libc = "0.2"
libcontainer = { version = "0.6.0", default-features = false, features = ["systemd", "v2"] }
mbuild-core = { path = "../mbuild-core" }
nix = { version = "0.29", features = ["fs", "process", "user"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.14"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.11", features = ["v4"] }
