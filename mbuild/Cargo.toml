[package]
name = "mbuild"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
fsobj-hash = { path = "../fsobj-hash" }
mbuild-core = { path = "../mbuild-core" }
mbuild-binary = { path = "../mbuild-binary" }
mbuild-fetch = { path = "../mbuild-fetch" }
mbuild-image = { path = "../mbuild-image" }
mbuild-text = { path = "../mbuild-text" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3", features = ["formatting", "local-offset", "macros"] }

[dev-dependencies]
tar = "0.4"
flate2 = "1.0"
mockito = "1.6"
sha2 = "0.10"
tempfile = "3.14"
